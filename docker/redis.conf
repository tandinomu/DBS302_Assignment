# ─── Network ────────────────────────────────────────────────────────────────
bind 0.0.0.0
protected-mode no
port 6379

# ─── Persistence: RDB snapshots ─────────────────────────────────────────────
# Save a snapshot if at least 1 key changed in 900s, 10 keys in 300s, 10000 in 60s
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# ─── Persistence: AOF (Append-Only File) ────────────────────────────────────
# AOF provides durability: every write is flushed to disk every second.
# Combined with RDB this is "hybrid persistence" — fast restarts + durability.
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# ─── Memory Management ──────────────────────────────────────────────────────
# Limit to 256 MB; evict least-recently-used keys when full.
# allkeys-lru is appropriate because ALL key types (sessions, cache, leaderboard)
# benefit from recency-based eviction — hot data stays, cold data leaves.
maxmemory 256mb
# allkeys-lru: evict least-recently-used keys across ALL keys.
# Safe because all cached data is reconstructable from MongoDB.
# Chosen over volatile-lru (would OOM on keyless entries) and
# noeviction (would crash on full memory).
maxmemory-policy allkeys-lru

# ─── Slow Log ───────────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ─── Keyspace Notifications (for expiry events) ─────────────────────────────
notify-keyspace-events "Ex"

# ─── Replication ────────────────────────────────────────────────────────────
replica-serve-stale-data yes
replica-read-only yes
